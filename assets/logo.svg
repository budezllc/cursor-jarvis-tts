<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#050a12"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#e8f7ff"/>
      <stop offset="25%" stop-color="#5ec8ff"/>
      <stop offset="55%" stop-color="#1a8cff"/>
      <stop offset="85%" stop-color="#0a4fa8"/>
      <stop offset="100%" stop-color="#062a5c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3db8ff" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#1a8cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- outer aura -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)" filter="url(#blur)"/>

  <!-- orbit ring -->
  <ellipse cx="32" cy="32" rx="24" ry="9" stroke="#3db8ff" stroke-width="0.9" stroke-opacity="0.35" fill="none" transform="rotate(-22 32 32)"/>

  <!-- core orb -->
  <circle cx="32" cy="32" r="15" fill="url(#orb)"/>

  <!-- specular highlight -->
  <ellipse cx="27" cy="26" rx="5.5" ry="3.2" fill="#ffffff" opacity="0.55" transform="rotate(-18 27 26)"/>
  <ellipse cx="25.5" cy="24.5" rx="2.2" ry="1.3" fill="#ffffff" opacity="0.75" transform="rotate(-18 25.5 24.5)"/>

  <!-- inner energy lines -->
  <path d="M32 20.5c-4.2 2.8-6.5 6.2-6.5 11.5s2.3 8.7 6.5 11.5" stroke="#b8e8ff" stroke-width="0.7" stroke-opacity="0.45" fill="none"/>
  <path d="M32 20.5c4.2 2.8 6.5 6.2 6.5 11.5s-2.3 8.7-6.5 11.5" stroke="#b8e8ff" stroke-width="0.7" stroke-opacity="0.45" fill="none"/>
</svg>
